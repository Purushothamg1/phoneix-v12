version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: phoneix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-phoneix_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phoneix_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phoneix_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:5000}
      PORT: 5000
      UPLOAD_DIR: /app/uploads
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - phoneix_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: phoneix_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - phoneix_net

  nginx:
    image: nginx:alpine
    container_name: phoneix_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - phoneix_net

volumes:
  postgres_data:
  uploads_data:
  logs_data:

networks:
  phoneix_net:
    driver: bridge
